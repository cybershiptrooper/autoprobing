method: "lr"
model_name: "llama-70b-3.3"
train_data: "repe"
eval_data:
  - "harm-pressure-knowledge-report"
  - "harm-pressure-choice"
  - "convincing-game"
  - "insider-trading"
  - "instructed-deception"
control_data: "alpaca"
val_data: "mask"
detect_layers: [20]
reg_coeff: 10
max_iter: 1000
val_fraction: 0.2
aggregation: "mean"
alpaca_size: 2000        # Total alpaca samples extracted (used for eval FPR calibration)
val_alpaca_size: 200     # Subset used during training validation on MASK
output_dir: "outputs/"
batch_size: 4
